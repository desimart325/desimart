[build]
  command     = "npm run build"
  publish     = "dist"

# Proxy /api calls to the Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://dominant-darell-desimart-ad8ea85a.koyeb.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — all non-asset routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
